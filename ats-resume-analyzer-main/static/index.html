<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ATS Resume Optimizer</title>
    <link rel="stylesheet" href="/static/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <div class="main-container">
        <header>
            <h1>ATS Resume <span class="highlight">Match Score</span></h1>
            <p>Check your resume fit against job description.</p>
        </header>

        <form id="analyzeForm" enctype="multipart/form-data">
            
            <div class="input-group">
                <label for="job_description">1. Paste Job Description</label>
                <textarea id="job_description" name="job_description" placeholder="Paste the JD text here..." required></textarea>
            </div>

            <div class="input-group">
                <label>2. Upload Resume (PDF)</label>
                
                <button type="button" class="container-btn-file">
                    <svg fill="#fff" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24">
                        <path d="M14 2H6c-1.1 0-1.99.9-1.99 2L4 20c0 1.1.89 2 1.99 2H18c1.1 0 2-.9 2-2V8l-6-6zm2 16H8v-2h8v2zm0-4H8v-2h8v2zm-3-5V3.5L18.5 9H13z"/>
                    </svg>
                    Select PDF Resume
                    <input class="file" name="resume" id="resume" type="file" accept=".pdf" required />
                </button>
                <span id="file-name" class="file-name">No file selected</span>
            </div>

            <button type="submit" id="submitBtn" class="analyze-btn">Analyze Match</button>
        </form>

        <div id="loading" class="hidden">
            <div class="spinner"></div>
            <p>Scanning Resume...</p>
        </div>

        <div id="results" class="results-container hidden">
            
            <div class="score-card">
                <div class="score-circle">
                    <span id="match_score">0%</span>
                    <small>Match</small>
                </div>
                <div class="category-info">
                    <h3>Resume Category</h3>
                    <span id="resume_category" class="badge category-badge">Unknown</span>
                </div>
            </div>

            <div class="skills-section">
                <div class="skill-box">
                    <h4>Matched Skills</h4>
                    <div id="matched_skills" class="tags-container"></div>
                </div>
                <div class="skill-box">
                    <h4>Missing Skills</h4>
                    <div id="missing_skills" class="tags-container"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="/static/script.js"></script>
</body>
</html>
